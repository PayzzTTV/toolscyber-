name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── 1re Voie : Flow ─────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8 + black + isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: flake8
        run: flake8 core/ config/ main.py --max-line-length=100

      - name: black
        run: black --check core/ config/ main.py tests/

      - name: isort
        run: isort --check-only core/ config/ main.py tests/

  # ── 2e Voie : Feedback ───────────────────────────────────────────────────────
  test:
    name: Tests (pytest + coverage ≥ 80%)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=core --cov=config \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ── DevSecOps : Shift Left ───────────────────────────────────────────────────
  security-sast:
    name: SAST (bandit + safety)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: bandit — static analysis
        run: bandit -r core/ config/ main.py -ll

      - name: pip-audit — dependency CVE check
        run: pip-audit -r requirements.txt

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security-sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rootguard:ci .

  docker-scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rootguard:ci .

      - name: Trivy — scan image for CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "rootguard:ci"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
